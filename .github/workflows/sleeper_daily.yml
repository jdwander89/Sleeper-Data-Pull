name: Daily Sleeper League Update

on:
  schedule:
    - cron: "0 6 * * *"   # Runs every day at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Sleeper update script
        run: python sleeper_to_chatgpt.py --week 1

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sleeper_chatgpt.json
          git commit -m "Daily Sleeper data update" || echo "No changes to commit"
          git push
